name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "tour/**"
      - "crates/wn-wasm/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wn-wasm
        working-directory: crates/wn-wasm
        run: wasm-pack build --target web --out-dir $GITHUB_WORKSPACE/tour/src/lib/wasm/pkg

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: pnpm build

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.output/public --project-name=wn-docs

      - name: Install tour dependencies
        working-directory: tour
        run: pnpm install --frozen-lockfile

      - name: Build tour
        working-directory: tour
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy tour to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tour/.svelte-kit/cloudflare --project-name=wn-tour
