[workspace]
changelog_config = "cliff.toml"
git_tag_enable = true
git_release_enable = false
publish = false
git_only = true
release_always = false
pr_labels = ["release"]
semver_check = false
dependencies_update = false

[[package]]
name = "wn"
changelog_path = "CHANGELOG.md"
changelog_update = true
changelog_include = ["wn-cli"]

[[package]]
name = "wn-cli"
changelog_update = false